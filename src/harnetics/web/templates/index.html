<!--
[INPUT]: 依赖 base.html 继承、/api/status 数据（HTMX GET）
[OUTPUT]: 渲染仪表盘：统计卡、快捷操作、系统健康指示
[POS]: web/templates 的首页仪表盘，US5 的主入口
[PROTOCOL]: 变更时更新此头部，然后检查 AGENTS.md
-->
{% extends "base.html" %}

{% block title %}Harnetics — 仪表盘{% endblock %}

{% block content %}
<div class="space-y-6">
  <!-- 页眉 -->
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-3xl font-bold">工作台概览</h1>
      <p class="text-base-content/60 mt-1">商业航天文档对齐平台</p>
    </div>
    <div class="flex gap-2">
      <a href="/documents/upload" class="btn btn-primary btn-sm">+ 上传文档</a>
      <a href="/drafts/workspace" class="btn btn-secondary btn-sm">+ 生成草稿</a>
    </div>
  </div>

  <!-- 统计卡（HTMX 拉取） -->
  <div id="status-cards"
       hx-get="/api/status"
       hx-trigger="load, every 30s"
       hx-target="#status-cards"
       hx-swap="innerHTML"
       class="grid grid-cols-2 md:grid-cols-4 gap-4">
    <!-- loading skeleton -->
    {% for _ in range(4) %}
    <div class="card bg-base-100 shadow animate-pulse">
      <div class="card-body p-4">
        <div class="h-4 bg-base-300 rounded w-2/3 mb-3"></div>
        <div class="h-8 bg-base-300 rounded w-1/3"></div>
      </div>
    </div>
    {% endfor %}
  </div>

  <!-- 快捷操作 -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
    <a href="/documents" class="card bg-base-100 shadow hover:shadow-md transition-shadow cursor-pointer">
      <div class="card-body p-5">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-lg bg-primary/10 flex items-center justify-center text-primary text-xl">📂</div>
          <div>
            <div class="font-semibold">文档库</div>
            <div class="text-xs text-base-content/60">浏览 &amp; 上传文档</div>
          </div>
        </div>
      </div>
    </a>
    <a href="/drafts/workspace" class="card bg-base-100 shadow hover:shadow-md transition-shadow cursor-pointer">
      <div class="card-body p-5">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-lg bg-secondary/10 flex items-center justify-center text-secondary text-xl">✍️</div>
          <div>
            <div class="font-semibold">草稿工作台</div>
            <div class="text-xs text-base-content/60">AI 辅助生成对齐草稿</div>
          </div>
        </div>
      </div>
    </a>
    <a href="/impact" class="card bg-base-100 shadow hover:shadow-md transition-shadow cursor-pointer">
      <div class="card-body p-5">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-lg bg-warning/10 flex items-center justify-center text-warning text-xl">⚡</div>
          <div>
            <div class="font-semibold">变更影响</div>
            <div class="text-xs text-base-content/60">分析下游受影响文档</div>
          </div>
        </div>
      </div>
    </a>
    <a href="/graph" class="card bg-base-100 shadow hover:shadow-md transition-shadow cursor-pointer">
      <div class="card-body p-5">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-lg bg-accent/10 flex items-center justify-center text-accent text-xl">🔗</div>
          <div>
            <div class="font-semibold">文档图谱</div>
            <div class="text-xs text-base-content/60">可视化关系网络</div>
          </div>
        </div>
      </div>
    </a>
  </div>

  <!-- 底部双栏：最近草稿 + 系统健康 -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
    <!-- 最近草稿 -->
    <div class="card bg-base-100 shadow">
      <div class="card-body">
        <h2 class="card-title text-base">最近草稿</h2>
        <div id="recent-drafts"
             hx-get="/api/draft"
             hx-trigger="load"
             hx-target="#recent-drafts"
             hx-swap="innerHTML"
             class="space-y-2 min-h-[120px]">
          <div class="text-base-content/40 text-sm">加载中…</div>
        </div>
        <div class="card-actions justify-end mt-2">
          <a href="/drafts/workspace" class="btn btn-ghost btn-xs">查看全部 →</a>
        </div>
      </div>
    </div>

    <!-- 陈旧引用警告 -->
    <div class="card bg-base-100 shadow">
      <div class="card-body">
        <h2 class="card-title text-base">陈旧引用警告</h2>
        <div id="stale-refs"
             hx-get="/api/graph/stale"
             hx-trigger="load"
             hx-target="#stale-refs"
             hx-swap="innerHTML"
             class="space-y-2 min-h-[120px]">
          <div class="text-base-content/40 text-sm">加载中…</div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
