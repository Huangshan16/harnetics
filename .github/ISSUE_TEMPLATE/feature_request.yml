name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting an improvement! We appreciate your ideas for making Harnetics better.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Describe the pain point or unmet need.
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like. Focus on the user experience, not implementation.
      placeholder: "I'd like to be able to..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered.

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      description: Which part of the system would this affect?
      options:
        - Document Library
        - Draft Generation
        - Impact Analysis
        - Document Graph
        - Dashboard
        - CLI
        - API
        - Frontend UI
        - New Module
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Important — it would significantly improve my workflow
        - Critical — I can't use the product effectively without it

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any screenshots, mockups, or links that help illustrate the feature.

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and feature requests to avoid duplicates
          required: true
