version: "3.9"

services:
  # ---- Harnetics Web 服务 ----
  harnetics:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./var:/app/var          # 持久化 SQLite + ChromaDB
      - ./fixtures:/app/fixtures # 样本文档（可选，ingest 时用）
    environment:
      - HARNETICS_GRAPH_DB_PATH=/app/var/harnetics.db
      - HARNETICS_CHROMA_DIR=/app/var/chroma
      - HARNETICS_LLM_MODEL=ollama/gemma4:26b-it-a4b-q4_K_M
      - HARNETICS_LLM_BASE_URL=http://ollama:11434
    depends_on:
      - ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---- Ollama LLM 服务 ----
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  ollama_data:
